<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAV Design</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#F4F4F2;
      --bg-2:#EFEFED;
      --panel:#FAFAF8;
      --panel-2:#F6F5F2;
      --text:#1C1C1C;
      --muted:#6F6F6F;
      --line:#DEDDD8;
      --taupe:#8A7F73;
      --taupe-deep:#73695F;
      --white:#FFFFFF;
      --shadow-1:0 10px 30px rgba(28,28,28,.035);
      --shadow-2:0 18px 52px rgba(28,28,28,.045);
      --shadow-btn:0 12px 26px rgba(18,18,18,.12);
      --radius-lg:14px;
      --radius-md:12px;
      --radius-sm:9px;
      --container:1320px;
      --header-h:82px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Manrope",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.85), transparent 34%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    img{display:block;max-width:100%}
    a{text-decoration:none;color:inherit}
    button,input,textarea{font:inherit}
    .hidden{display:none !important}

    .page-bg{
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.82), transparent 34%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    }

    .container{
      width:min(var(--container), calc(100% - 40px));
      margin:0 auto;
    }

    .section{
      padding:96px 0;
    }

    .section-head{
      display:grid;
      gap:16px;
      max-width:900px;
      margin:0 auto 42px;
      text-align:center;
    }

    .eyebrow{
      margin:0;
      font-size:12px;
      line-height:1;
      letter-spacing:.30em;
      text-transform:uppercase;
      color:var(--taupe-deep);
      font-weight:700;
    }

    .section-title{
      margin:0;
      font-family:"Cormorant Garamond", Georgia, serif;
      font-size:clamp(2.7rem, 4vw, 4.6rem);
      line-height:.92;
      letter-spacing:-.035em;
      text-transform:uppercase;
      font-weight:600;
      color:var(--text);
    }

    .section-subtitle{
      margin:0;
      font-size:18px;
      line-height:1.82;
      color:var(--muted);
      max-width:760px;
      justify-self:center;
    }

    .script-line{
      margin:0;
      font-family:"Cormorant Garamond", Georgia, serif;
      font-style:italic;
      font-size:clamp(1.2rem, 2vw, 1.7rem);
      line-height:1.2;
      color:var(--taupe-deep);
      letter-spacing:-.01em;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:90;
      height:var(--header-h);
      border-bottom:1px solid rgba(222,221,216,.9);
      background:rgba(244,244,242,.88);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .site-header .inner{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .brand-title{
      font-size:18px;
      font-weight:700;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--text);
    }

    .brand-subtitle{
      margin-top:3px;
      font-size:11px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .nav{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav a{
      font-size:13px;
      line-height:1;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:#555;
      transition:.2s ease;
      white-space:nowrap;
    }

    .nav a:hover{color:var(--text)}

    .header-actions{
      display:flex;
      align-items:center;
      gap:12px;
      flex-shrink:0;
    }

    .lang-switch{
      display:flex;
      align-items:center;
      padding:4px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
    }

    .lang-switch button{
      border:none;
      background:transparent;
      cursor:pointer;
      border-radius:999px;
      padding:7px 13px;
      font-size:12px;
      font-weight:700;
      color:var(--muted);
      transition:.2s ease;
    }

    .lang-switch button.active{
      background:var(--text);
      color:#fff;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      cursor:pointer;
      text-decoration:none;
      white-space:nowrap;
      transition:.22s ease;
      font-weight:700;
      border:1px solid transparent;
    }

    .btn-pill{
      border-radius:999px;
      padding:11px 22px;
      font-size:14px;
    }

    .btn-lg{
      border-radius:999px;
      padding:15px 28px;
      font-size:15px;
    }

    .btn-dark{
      background:var(--text);
      color:#fff;
      box-shadow:var(--shadow-btn);
    }

    .btn-dark:hover{
      background:#111;
      transform:translateY(-1px);
    }

    .hero{
      padding:0 0 92px;
    }

    .hero-card{
      position:relative;
      min-height:calc(100vh - var(--header-h));
      overflow:hidden;
      border-bottom:1px solid rgba(222,221,216,.9);
      background:#d7d3ce;
      box-shadow:0 16px 44px rgba(28,28,28,.04);
    }

    .hero-image,
    .hero-image img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    .hero-image img{
      object-fit:cover;
    }

    .hero-fallback{
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg,#d6d1ca 0%,#f1f0ec 35%,#c9c2b8 70%,#f0eeea 100%);
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      z-index:1;
      background:
        linear-gradient(90deg, rgba(19,19,19,.58) 0%, rgba(19,19,19,.34) 28%, rgba(19,19,19,.14) 58%, rgba(19,19,19,.08) 100%),
        linear-gradient(180deg, rgba(19,19,19,.12) 0%, rgba(19,19,19,.04) 25%, rgba(19,19,19,.18) 84%, rgba(19,19,19,.28) 100%);
    }

    .hero-content{
      position:relative;
      z-index:2;
      min-height:calc(100vh - var(--header-h));
      display:flex;
      align-items:center;
    }

    .hero-copy{
      max-width:780px;
      color:#fff;
      padding:58px 0;
      display:grid;
      gap:18px;
      align-content:start;
    }

    .hero-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:max-content;
      min-height:38px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.26);
      background:linear-gradient(180deg, rgba(255,255,255,.14) 0%, rgba(255,255,255,.07) 100%);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      font-family:"Manrope",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      font-size:11px;
      line-height:1;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:rgba(255,246,236,.94);
      font-weight:700;
      box-shadow:0 10px 22px rgba(14,10,7,.12), inset 0 1px 0 rgba(255,255,255,.12);
    }

    .hero-title{
      margin:0;
      max-width:760px;
      display:grid;
      gap:10px;
      text-shadow:0 10px 28px rgba(0,0,0,.16);
    }

    .hero-title-main,
    .hero-title-meta{
      display:block;
      font-family:"Cormorant Garamond", Georgia, serif;
      text-transform:uppercase;
      white-space:normal;
    }

    .hero-title-main{
      font-size:clamp(3.2rem, 5.7vw, 5.45rem);
      line-height:.92;
      letter-spacing:-.045em;
      font-weight:600;
      max-width:9.5ch;
    }

    .hero-title-meta{
      font-size:clamp(1.7rem, 2.8vw, 2.5rem);
      line-height:.95;
      letter-spacing:-.028em;
      font-weight:500;
      opacity:.96;
    }

    .hero-subtitle{
      margin:0;
      max-width:640px;
      font-family:"Manrope",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      font-size:clamp(1rem,1.45vw,1.2rem);
      line-height:1.82;
      color:rgba(255,255,255,.94);
      font-weight:500;
    }

    .hero-kicker{
      margin:0;
      max-width:540px;
      font-family:"Cormorant Garamond", Georgia, serif;
      font-style:italic;
      font-size:clamp(1.1rem, 1.55vw, 1.4rem);
      line-height:1.22;
      color:rgba(255,245,233,.9);
      letter-spacing:-.01em;
    }

    .hero-micro{
      margin:4px 0 0;
      font-family:"Manrope",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      font-size:12px;
      line-height:1.65;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(255,245,233,.62);
      font-weight:600;
    }

    .hero-actions{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .btn-primary-hero,
    .btn-secondary-hero{
      min-height:58px;
      padding:0 28px;
      font-family:"Manrope",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      font-size:14px;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-weight:700;
      transform-origin:center;
    }

    .btn-primary-hero{
      background:#111111;
      color:#fff;
      box-shadow:var(--shadow-btn), 0 0 26px rgba(232,212,181,.12);
    }

    .btn-primary-hero:hover{
      background:#000;
      transform:translateY(-2px) scale(1.02);
    }

    .btn-secondary-hero{
      background:rgba(255,255,255,.04);
      color:#fff;
      border:1px solid rgba(255,255,255,.55);
      box-shadow:0 10px 22px rgba(17,12,8,.07);
    }

    .btn-secondary-hero:hover{
      background:rgba(255,255,255,.12);
      border-color:rgba(255,255,255,.74);
      transform:translateY(-2px) scale(1.02);
    }

    .hero-reveal{
      opacity:0;
      transform:translateY(22px);
      animation:heroFadeUp .9s cubic-bezier(.22,.65,.18,1) forwards;
    }

    .hero-reveal-delay-1{animation-delay:.08s}
    .hero-reveal-delay-2{animation-delay:.16s}
    .hero-reveal-delay-3{animation-delay:.24s}
    .hero-reveal-delay-4{animation-delay:.32s}
    .hero-reveal-delay-5{animation-delay:.4s}

    @keyframes heroFadeUp{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes heroImageFloat{
      0%{transform:scale(1.03) translate3d(0,0,0)}
      100%{transform:scale(1.08) translate3d(0,-10px,0)}
    }

    .process-grid{
      display:grid;
      gap:18px;
      grid-template-columns:repeat(5,minmax(0,1fr));
      align-items:stretch;
      position:relative;
    }

    .process-card{
      position:relative;
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:18px;
      padding:14px;
      border-radius:12px;
      background:rgba(255,255,255,.7);
      border:1px solid var(--line);
      box-shadow:var(--shadow-1);
      min-height:100%;
    }

    .process-visual,
    .service-visual,
    .fit-visual{
      position:relative;
      aspect-ratio:4/3;
      overflow:hidden;
      border-radius:10px;
      background:#ddd;
      border:1px solid rgba(222,221,216,.7);
    }

    .process-visual img,
    .service-visual img,
    .fit-visual img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .process-visual.no-image,
    .service-visual.no-image,
    .fit-visual.no-image{
      background:linear-gradient(135deg,#ebe8e2 0%,#d6cec3 100%);
    }

    .process-step{
      font-size:12px;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:var(--taupe-deep);
      font-weight:700;
    }

    .process-card h3,
    .service-card h3,
    .fit-card h3{
      margin:0;
      font-size:16px;
      line-height:1.45;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:700;
      color:var(--text);
    }

    .process-card p,
    .service-card p,
    .fit-card p{
      margin:0;
      font-size:14px;
      line-height:1.85;
      color:var(--muted);
    }

    .process-arrow{
      position:absolute;
      top:86px;
      right:-13px;
      z-index:3;
      width:26px;
      height:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#9b958e;
      font-size:18px;
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:999px;
    }

    .benefits-grid{
      display:grid;
      gap:18px;
      grid-template-columns:repeat(3,minmax(0,1fr));
    }

    .benefit-card{
      position:relative;
      padding:24px 22px 22px;
      border:1px solid var(--line);
      border-radius:12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.78) 0%, rgba(247,246,242,.88) 100%);
      box-shadow:var(--shadow-1);
      overflow:hidden;
      min-height:245px;
    }

    .benefit-card::before{
      content:"";
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(138,127,115,.24), transparent);
    }

    .benefit-label{
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--taupe-deep);
      font-weight:700;
    }

    .benefit-main{
      margin:18px 0 0;
      font-family:"Cormorant Garamond", Georgia, serif;
      font-size:clamp(1.85rem,2.4vw,2.35rem);
      line-height:.96;
      letter-spacing:-.03em;
      text-transform:uppercase;
      color:var(--text);
      font-weight:600;
      white-space:pre-line;
      max-width:300px;
    }

    .benefit-note{
      margin:18px 0 0;
      font-size:14px;
      line-height:1.9;
      color:var(--muted);
      max-width:310px;
    }

    .examples-controls{
      display:grid;
      gap:14px;
      justify-items:center;
      margin-bottom:28px;
    }

    .examples-control-group{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .category-tab{
      appearance:none;
      border:1px solid var(--line);
      background:rgba(255,255,255,.64);
      color:var(--text);
      border-radius:999px;
      padding:10px 16px;
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
    }

    .category-tab.active{
      background:var(--text);
      color:#fff;
      border-color:var(--text);
    }

    .examples-section{
      position:relative;
      overflow:hidden;
    }

    .examples-section::before,
    .examples-section::after{
      content:"";
      position:absolute;
      pointer-events:none;
      border-radius:999px;
      filter:blur(4px);
    }

    .examples-section::before{
      width:440px;
      height:440px;
      left:-120px;
      top:110px;
      background:radial-gradient(circle, rgba(255,244,227,.6) 0%, rgba(255,244,227,0) 68%);
      opacity:.9;
    }

    .examples-section::after{
      width:520px;
      height:520px;
      right:-140px;
      bottom:20px;
      background:radial-gradient(circle, rgba(225,212,190,.34) 0%, rgba(225,212,190,0) 72%);
      opacity:.8;
    }

    .examples-controls{
      position:relative;
      z-index:2;
    }

    .examples-module{
      position:relative;
      z-index:2;
      overflow:hidden;
      border:1px solid rgba(212,202,190,.78);
      background:
        radial-gradient(circle at 14% 12%, rgba(255,251,245,.96) 0%, rgba(255,251,245,0) 30%),
        radial-gradient(circle at 86% 18%, rgba(246,234,214,.5) 0%, rgba(246,234,214,0) 30%),
        linear-gradient(135deg, rgba(248,244,238,.96) 0%, rgba(241,236,229,.94) 48%, rgba(247,244,239,.96) 100%);
      border-radius:28px;
      box-shadow:
        0 24px 60px rgba(65,49,32,.08),
        inset 0 1px 0 rgba(255,255,255,.9),
        inset 0 -1px 0 rgba(190,174,153,.16);
      padding:24px;
      isolation:isolate;
    }

    .examples-module::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.52) 0%, rgba(255,255,255,0) 18%),
        radial-gradient(circle at 78% 76%, rgba(233,217,193,.18) 0%, rgba(233,217,193,0) 28%);
      z-index:0;
    }

    .examples-module::after{
      content:"✦";
      position:absolute;
      right:34px;
      top:30px;
      font-size:18px;
      line-height:1;
      color:rgba(189,156,111,.58);
      text-shadow:0 0 14px rgba(252,230,198,.52);
      pointer-events:none;
      z-index:2;
    }

    /* ===== PREMIUM СЕТКА "ПРИМЕРЫ РЕШЕНИЙ" ===== */
    .cases-layout{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:minmax(320px, 1.05fr) minmax(0, 2fr);
      gap:22px;
      align-items:stretch;
    }

    .cases-left,
    .cases-right{
      display:grid;
      grid-template-rows:auto 1fr;
      gap:12px;
      min-height:100%;
    }

    .cases-right-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      grid-template-rows:repeat(2, 1fr);
      gap:14px;
      align-content:stretch;
      height:100%;
    }

    .example-block-label{
      position:relative;
      font-size:11px;
      letter-spacing:.32em;
      text-transform:uppercase;
      color:#857564;
      font-weight:800;
      margin-bottom:2px;
      min-height:18px;
      display:flex;
      align-items:center;
      gap:12px;
      padding-left:2px;
    }

    .example-block-label::before{
      content:"";
      width:24px;
      height:1px;
      background:linear-gradient(90deg, rgba(170,143,106,.72), rgba(170,143,106,0));
      flex:0 0 auto;
    }

    .source-card-wrap,
    .variant-card-wrap{
      display:grid;
      gap:0;
      min-height:0;
    }

    .example-card{
      position:relative;
      overflow:hidden;
      border-radius:22px;
      border:1px solid rgba(214,202,184,.92);
      background:#ddd;
      aspect-ratio:2 / 3;
      width:100%;
      height:auto;
      box-shadow:
        0 18px 42px rgba(64,46,28,.08),
        inset 0 1px 0 rgba(255,255,255,.72);
      transform:translateY(0);
      transition:transform .32s ease, box-shadow .32s ease, border-color .32s ease, filter .32s ease;
      isolation:isolate;
    }

    .example-card::before{
      content:"";
      position:absolute;
      inset:1px;
      border-radius:inherit;
      padding:1px;
      background:linear-gradient(145deg, rgba(255,246,232,.9), rgba(215,189,151,.54), rgba(255,247,235,.7));
      -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;
      mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite:exclude;
      opacity:.58;
      pointer-events:none;
      z-index:3;
    }

    .example-card::after{
      content:"";
      position:absolute;
      left:8%;
      right:10%;
      top:0;
      height:34%;
      border-radius:0 0 38px 38px;
      background:linear-gradient(180deg, rgba(255,255,255,.42) 0%, rgba(255,255,255,0) 100%);
      opacity:.72;
      pointer-events:none;
      z-index:2;
    }

    .example-card img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scale(1.01);
    }

    .example-card.no-image{
      background:linear-gradient(135deg,#ebe4d7 0%,#d6cec3 100%);
    }

    .example-card-source{
      border-color:rgba(210,203,194,.96);
      box-shadow:
        0 16px 36px rgba(64,46,28,.055),
        inset 0 1px 0 rgba(255,255,255,.78),
        0 0 0 1px rgba(255,255,255,.35);
    }

    .example-card-source::before{
      opacity:.36;
      background:linear-gradient(145deg, rgba(255,255,255,.82), rgba(207,197,183,.34), rgba(255,255,255,.72));
    }

    .example-card-variant{
      box-shadow:
        0 22px 52px rgba(64,46,28,.11),
        0 0 0 1px rgba(255,248,238,.22),
        0 0 22px rgba(232,207,170,.18),
        inset 0 1px 0 rgba(255,255,255,.82);
    }

    .example-card-variant:hover{
      transform:translateY(-6px);
      border-color:rgba(217,190,149,.98);
      box-shadow:
        0 28px 64px rgba(64,46,28,.14),
        0 0 0 1px rgba(255,248,238,.3),
        0 0 34px rgba(234,207,165,.28),
        inset 0 1px 0 rgba(255,255,255,.86);
      filter:saturate(1.02);
    }

    .example-card-badge{
      position:absolute;
      left:14px;
      top:14px;
      z-index:4;
      display:inline-flex;
      align-items:center;
      gap:8px;
      max-width:calc(100% - 28px);
      min-height:34px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,236,211,.5);
      background:linear-gradient(180deg, rgba(72,56,42,.72) 0%, rgba(40,31,23,.6) 100%);
      box-shadow:
        0 8px 20px rgba(24,19,15,.18),
        0 0 18px rgba(245,220,180,.12),
        inset 0 1px 0 rgba(255,255,255,.14);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .example-card-badge-number,
    .example-card-badge-text{
      font-size:10px;
      line-height:1;
      letter-spacing:.24em;
      text-transform:uppercase;
      font-weight:800;
      color:rgba(255,248,238,.94);
      white-space:nowrap;
    }

    .example-card-badge-number{
      color:rgba(246,217,177,.88);
    }

    .example-card-caption{
      position:absolute;
      left:18px;
      right:18px;
      bottom:18px;
      z-index:4;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      pointer-events:none;
    }

    .example-card-caption-line{
      width:46px;
      height:1px;
      background:linear-gradient(90deg, rgba(255,237,211,.76), rgba(255,237,211,0));
      flex:0 0 auto;
    }

    .example-card-caption-text{
      font-size:10px;
      line-height:1;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:rgba(255,247,236,.86);
      font-weight:700;
      text-shadow:0 2px 12px rgba(0,0,0,.12);
    }

    .example-card-glow{
      position:absolute;
      inset:-12%;
      z-index:1;
      pointer-events:none;
      background:radial-gradient(circle at 50% 12%, rgba(244,220,184,.24) 0%, rgba(244,220,184,0) 42%);
      opacity:.9;
    }

    .example-card-sparkle{
      position:absolute;
      right:16px;
      bottom:16px;
      z-index:4;
      font-size:14px;
      line-height:1;
      color:rgba(249,227,193,.88);
      text-shadow:0 0 18px rgba(255,229,191,.56);
      opacity:.9;
      pointer-events:none;
    }

    .cases-left .example-card{
      height:100%;
      min-height:0;
    }

    .options-flow{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      justify-content:center;
    }

    .option-chip{
      border:1px solid var(--line);
      background:rgba(255,255,255,.72);
      box-shadow:var(--shadow-1);
      border-radius:12px;
      padding:18px 18px 16px;
      min-height:120px;
      display:grid;
      align-content:start;
      gap:10px;
    }

    .option-chip.wide{flex:1 1 360px; max-width:560px;}
    .option-chip.mid{flex:1 1 290px; max-width:420px;}
    .option-chip.narrow{flex:1 1 240px; max-width:320px;}

    .option-chip h3{
      margin:0;
      font-size:15px;
      line-height:1.5;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:700;
      color:var(--text);
    }

    .option-chip p{
      margin:0;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .services-grid{
      display:grid;
      gap:18px;
      grid-template-columns:repeat(3,minmax(0,1fr));
    }

    .service-card,
    .fit-card{
      position:relative;
      padding:14px;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(255,255,255,.76);
      box-shadow:var(--shadow-1);
      min-height:100%;
      display:grid;
      gap:16px;
      align-content:start;
    }

    .fit-card{
      background:linear-gradient(180deg, rgba(255,255,255,.78) 0%, rgba(246,245,242,.92) 100%);
      overflow:hidden;
    }

    .fit-card::before{
      content:"";
      position:absolute;
      left:20px;
      right:20px;
      top:0;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(138,127,115,.28), transparent);
    }

    .fit-card::after{
      content:"";
      position:absolute;
      width:120px;
      height:120px;
      right:-30px;
      bottom:-34px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(138,127,115,.08) 0%, rgba(138,127,115,0) 72%);
      pointer-events:none;
    }

    .fit-card.wide{
      transform:translateY(-2px);
    }

    .fit-kicker{
      font-size:11px;
      line-height:1;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--taupe-deep);
      font-weight:700;
    }

    .service-price{
      margin-top:2px;
      padding-top:14px;
      border-top:1px solid var(--line);
      display:grid;
      gap:4px;
    }

    .service-price strong{
      font-family:"Cormorant Garamond", Georgia, serif;
      font-size:2rem;
      line-height:1;
      letter-spacing:-.03em;
      color:var(--text);
      font-weight:600;
    }

    .service-price span{
      font-size:12px;
      line-height:1.6;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--taupe-deep);
      font-weight:700;
    }

    .services-note{
      max-width:840px;
      margin:26px auto 0;
      text-align:center;
      font-size:16px;
      line-height:1.8;
      color:var(--muted);
    }

    .fit-grid{
      display:grid;
      gap:18px;
      grid-template-columns:repeat(3,minmax(0,1fr));
      align-items:stretch;
    }

    .contact-wrap{
      max-width:1060px;
      margin:0 auto;
      display:grid;
      gap:26px;
    }

    .contact-intro{
      text-align:center;
      display:grid;
      gap:14px;
    }

    .contact-title{
      margin:0;
      font-family:"Cormorant Garamond", Georgia, serif;
      font-size:clamp(2.8rem,4vw,4.5rem);
      line-height:.92;
      letter-spacing:-.03em;
      text-transform:uppercase;
      font-weight:600;
      color:var(--text);
    }

    .contact-subtitle{
      margin:0;
      max-width:780px;
      justify-self:center;
      font-size:20px;
      line-height:1.75;
      color:var(--muted);
    }

    .contact-text{
      margin:0;
      max-width:700px;
      justify-self:center;
      font-size:16px;
      line-height:1.85;
      color:var(--taupe-deep);
    }

    .contact-card{
      border:1px solid var(--line);
      background:rgba(255,255,255,.8);
      border-radius:14px;
      box-shadow:var(--shadow-2);
      padding:28px;
      display:grid;
      gap:18px;
    }

    .contact-form{
      display:grid;
      gap:16px;
    }

    .form-row{
      display:grid;
      gap:16px;
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .field{
      height:50px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 16px;
      color:var(--text);
      outline:none;
    }

    .field::placeholder,
    .textarea::placeholder{
      color:#85807a;
    }

    .textarea{
      min-height:150px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
      padding:16px;
      resize:vertical;
      outline:none;
      color:var(--text);
    }

    .upload{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      cursor:pointer;
      padding:16px 18px;
      border-radius:10px;
      border:1px dashed #d4d0c8;
      background:#fff;
      color:var(--muted);
    }

    .upload-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .upload-right{
      font-size:13px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#8c867e;
      font-weight:700;
    }

    .contact-bottom{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      flex-wrap:wrap;
      padding-top:8px;
    }

    .socials{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .social-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.9);
      font-size:12px;
      line-height:1;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:700;
    }

    .social-link:hover{
      color:var(--text);
      border-color:#cfcac1;
    }



    .contact-card{
      border:1px solid var(--line);
      background:rgba(255,255,255,.82);
      border-radius:14px;
      box-shadow:var(--shadow-2);
      padding:28px;
      display:grid;
      gap:18px;
    }

    .contact-actions{
      display:grid;
      gap:18px;
      text-align:center;
    }

    .contact-actions h3{
      margin:0;
      font-size:18px;
      line-height:1.5;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:700;
      color:var(--text);
    }

    .contact-helper{
      margin:0 auto;
      max-width:760px;
      font-size:15px;
      line-height:1.9;
      color:var(--muted);
    }

    .contact-buttons{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .contact-button{
      min-height:62px;
      border-radius:12px;
      padding:16px 20px;
      font-size:14px;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:rgba(255,255,255,.96);
      border:1px solid var(--line);
      color:var(--text);
      box-shadow:var(--shadow-1);
    }

    .contact-button:hover{
      transform:translateY(-1px);
      border-color:#cfcac1;
      background:#fff;
    }

    .contact-legal-note{
      margin:0;
      font-size:13px;
      line-height:1.8;
      color:var(--taupe-deep);
    }

    .site-footer{
      border-top:1px solid rgba(222,221,216,.9);
      background:rgba(255,255,255,.42);
    }

    .footer-inner{
      display:grid;
      gap:24px;
      padding:28px 0 36px;
    }

    .footer-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:20px;
      flex-wrap:wrap;
    }

    .footer-note{
      font-size:13px;
      line-height:1.8;
      color:var(--muted);
      max-width:520px;
    }

    .footer-mini,
    .footer-legal-links{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--muted);
    }

    .footer-mini a:hover,
    .footer-legal-links a:hover{color:var(--text)}

    .footer-legal{
      display:grid;
      gap:8px;
      padding-top:18px;
      border-top:1px solid rgba(222,221,216,.9);
    }

    .footer-legal p{
      margin:0;
      font-size:13px;
      line-height:1.8;
      color:var(--muted);
    }

    .modal{
      position:fixed;
      inset:0;
      z-index:120;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(19,19,19,.42);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .modal-content{
      width:min(560px, 100%);
      border-radius:18px;
      border:1px solid rgba(222,221,216,.9);
      background:rgba(250,250,248,.98);
      box-shadow:0 24px 80px rgba(0,0,0,.16);
      padding:28px;
      display:grid;
      gap:18px;
    }

    .modal-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
    }

    .modal-title{
      margin:0;
      font-family:"Cormorant Garamond", Georgia, serif;
      font-size:clamp(2rem, 4vw, 3rem);
      line-height:.95;
      text-transform:uppercase;
      letter-spacing:-.03em;
      font-weight:600;
    }

    .modal-text{
      margin:0;
      font-size:15px;
      line-height:1.85;
      color:var(--muted);
    }

    .modal-close{
      width:42px;
      height:42px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      cursor:pointer;
      font-size:18px;
    }

    .modal-links{
      display:grid;
      gap:12px;
    }

    .modal-link{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      min-height:58px;
      padding:0 18px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      font-size:14px;
      line-height:1.4;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-weight:700;
      color:var(--text);
      transition:.2s ease;
    }

    .modal-link:hover{
      transform:translateY(-1px);
      border-color:#cfcac1;
    }

    .cookie-banner{
      position:fixed;
      left:20px;
      right:20px;
      bottom:20px;
      z-index:110;
      display:none;
      grid-template-columns:1fr auto;
      gap:18px;
      align-items:center;
      padding:18px 20px;
      border-radius:16px;
      border:1px solid rgba(222,221,216,.96);
      background:rgba(250,250,248,.98);
      box-shadow:0 18px 52px rgba(28,28,28,.14);
    }

    .cookie-banner p{
      margin:0;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .cookie-banner a{
      color:var(--text);
      text-decoration:underline;
      text-underline-offset:2px;
    }

    .cookie-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn-light{
      background:#fff;
      color:var(--text);
      border-color:var(--line);
    }

    .btn-light:hover{
      background:#f8f8f6;
    }

    @media (max-width:1279px){
      .nav{display:none}
    }

    @media (max-width:1120px){
      .process-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .process-arrow{display:none}
      .benefits-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .services-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .fit-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .cases-layout{
        grid-template-columns:1fr;
      }
      .cases-right-grid{
        grid-template-columns:repeat(3,minmax(0,1fr));
        grid-template-rows:repeat(2, 1fr);
      }
      .cases-left .example-card{
        height:auto;
      }
    }

    @media (max-width:767px){
      .container{width:min(var(--container), calc(100% - 24px))}
      .section{padding:72px 0}
      .hero-card,
      .hero-content{
        min-height:78svh;
      }
      .hero-copy{
        padding:34px 0;
      }
      .hero-title-main{
        font-size:clamp(2.75rem, 13vw, 4.3rem);
        max-width:100%;
      }
      .hero-title-meta{
        font-size:clamp(1.45rem, 7vw, 2rem);
      }
      .hero-subtitle{
        font-size:1rem;
        line-height:1.74;
      }
      .hero-badge{
        min-height:34px;
        padding:9px 13px;
        font-size:10px;
      }
      .section-subtitle,
      .hero-copy .text,
      .contact-subtitle{font-size:16px}
      .process-grid,
      .benefits-grid,
      .services-grid,
      .fit-grid{
        grid-template-columns:1fr;
      }
      .cases-right-grid{
        grid-template-columns:1fr 1fr;
        grid-template-rows:auto;
      }
      .form-row{
        grid-template-columns:1fr;
      }
      .contact-bottom{
        align-items:flex-start;
        flex-direction:column;
      }
      .contact-buttons,
      .cookie-banner{
        grid-template-columns:1fr;
      }
      .cookie-actions{
        justify-content:flex-start;
      }
    }

    @media (max-width:560px){
      .cases-right-grid{
        grid-template-columns:1fr;
      }
      .modal-content{
        padding:22px;
      }
      .contact-buttons{
        grid-template-columns:1fr;
      }
    }

    /* ===== GLOBAL PREMIUM SYSTEM OVERRIDES ===== */
    :root{
      --bg:#f5f1eb;
      --bg-2:#efe8df;
      --bg-3:#e8dfd3;
      --panel:#fbf7f2;
      --panel-2:#f4ede4;
      --panel-3:rgba(255,250,244,.74);
      --text:#211c17;
      --muted:#6d6258;
      --muted-2:#8e8276;
      --line:#ddd2c4;
      --line-strong:#cfc1b0;
      --taupe:#938270;
      --taupe-deep:#6f5f4f;
      --accent:#b49a7d;
      --accent-soft:rgba(195,168,136,.22);
      --glow-soft:0 0 0 1px rgba(255,248,239,.78), 0 16px 40px rgba(72,55,34,.06), 0 3px 14px rgba(72,55,34,.045);
      --glow-card:0 1px 0 rgba(255,255,255,.8) inset, 0 22px 54px rgba(64,47,30,.08), 0 4px 18px rgba(64,47,30,.04);
      --glow-card-hover:0 1px 0 rgba(255,255,255,.88) inset, 0 28px 62px rgba(64,47,30,.11), 0 10px 22px rgba(64,47,30,.07);
      --shadow-1:0 16px 42px rgba(45,33,18,.05);
      --shadow-2:0 26px 72px rgba(45,33,18,.08);
      --shadow-btn:0 14px 32px rgba(36,24,12,.14);
      --radius-2xl:32px;
      --radius-xl:24px;
      --radius-lg:20px;
      --radius-md:16px;
      --radius-sm:12px;
      --radius-xs:10px;
    }

    body{
      background:
        radial-gradient(circle at 0% 0%, rgba(255,255,255,.86) 0%, rgba(255,255,255,0) 26%),
        radial-gradient(circle at 100% 8%, rgba(244,232,216,.55) 0%, rgba(244,232,216,0) 28%),
        linear-gradient(180deg, #f8f4ee 0%, #f1e9df 45%, #ece2d7 100%);
      color:var(--text);
    }

    .page-bg{
      background:
        radial-gradient(circle at 8% 2%, rgba(255,255,255,.86) 0%, rgba(255,255,255,0) 24%),
        radial-gradient(circle at 92% 10%, rgba(239,224,203,.46) 0%, rgba(239,224,203,0) 24%),
        radial-gradient(circle at 50% 100%, rgba(223,204,179,.18) 0%, rgba(223,204,179,0) 34%),
        linear-gradient(180deg, #f8f4ee 0%, #f1e9df 45%, #ece2d7 100%);
      opacity:1;
    }

    .section{
      position:relative;
      padding:104px 0;
    }

    .section::before{
      content:"";
      position:absolute;
      inset:18px 14px;
      border-radius:var(--radius-2xl);
      background:
        linear-gradient(180deg, rgba(255,251,246,.55) 0%, rgba(247,240,232,.38) 100%);
      border:1px solid rgba(223,210,195,.42);
      box-shadow:0 1px 0 rgba(255,255,255,.55) inset;
      pointer-events:none;
      z-index:0;
    }

    .section > .container,
    .hero > .container{ position:relative; z-index:1; }

    .section-head{
      margin-bottom:46px;
      gap:18px;
    }

    .eyebrow,
    .process-step,
    .benefit-label,
    .fit-kicker,
    .example-block-label,
    .upload-right,
    .footer-mini,
    .footer-legal-links,
    .brand-subtitle{
      color:var(--taupe-deep);
      letter-spacing:.22em;
    }

    .section-title,
    .contact-title{
      letter-spacing:-.04em;
      text-shadow:0 8px 24px rgba(255,255,255,.22);
    }

    .section-subtitle,
    .contact-subtitle,
    .services-note,
    .contact-helper,
    .contact-text,
    .footer-note,
    .footer-legal p,
    .process-card p,
    .service-card p,
    .fit-card p,
    .option-chip p,
    .benefit-note{
      color:var(--muted);
    }

    .site-header{
      height:88px;
      border-bottom:1px solid rgba(223,210,195,.9);
      background:rgba(248,243,236,.78);
      box-shadow:0 10px 28px rgba(49,36,20,.035);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .site-header .inner{gap:24px}

    .brand-title{
      font-size:18px;
      letter-spacing:.22em;
    }

    .nav a{
      position:relative;
      padding:10px 0;
      color:#5b5047;
      letter-spacing:.12em;
    }

    .nav a::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:1px;
      height:1px;
      background:linear-gradient(90deg, rgba(190,168,141,0), rgba(190,168,141,.72), rgba(190,168,141,0));
      transform:scaleX(0);
      transform-origin:center;
      transition:transform .28s ease;
    }

    .nav a:hover{color:var(--text)}
    .nav a:hover::after{transform:scaleX(1)}

    .lang-switch{

      document.title = t.brand;
      document.body.setAttribute("data-lang", lang);

      const app = document.getElementById("app");

      app.innerHTML = `
        <header class="site-header">
          <div class="container inner">
            <a href="#top" class="brand">
              <div class="brand-title">${escapeHtml(t.brand)}</div>
              <div class="brand-subtitle">${escapeHtml(t.brandSub)}</div>
            </a>

            <nav class="nav">
              ${t.menu.map(([id,label]) => `<a href="#${id}">${escapeHtml(label)}</a>`).join("")}
            </nav>

            <div class="header-actions">
              <div class="lang-switch">
                <button type="button" class="${lang === "ru" ? "active" : ""}" data-lang="ru">RU</button>
                <button type="button" class="${lang === "en" ? "active" : ""}" data-lang="en">EN</button>
              </div>
              <button type="button" class="btn btn-pill btn-dark" data-open-contact>${escapeHtml(t.cta)}</button>
            </div>
          </div>
        </header>

        <main id="top">
          <section class="hero">
            <div class="hero-card">
              ${
                IMAGE_CONFIG.hero?.src
                  ? `<div class="hero-image"><img src="${IMAGE_CONFIG.hero.src}" alt="${escapeHtml(IMAGE_CONFIG.hero.alt || t.hero.title)}"></div>`
                  : `<div class="hero-fallback"></div>`
              }
              <div class="hero-overlay"></div>

              <div class="hero-content">
                <div class="container">
                  <div class="hero-copy">
                    <div class="hero-badge hero-reveal hero-reveal-delay-1">${escapeHtml(t.hero.badge)}</div>
                    <h1 class="hero-title hero-reveal hero-reveal-delay-2">
                      <span class="hero-title-main">${escapeHtml(t.hero.titleMain)}</span>
                      <span class="hero-title-meta">${escapeHtml(t.hero.titleMeta)}</span>
                    </h1>
                    <p class="hero-subtitle hero-reveal hero-reveal-delay-3">${escapeHtml(t.hero.subtitle)}</p>
                    <p class="hero-kicker hero-reveal hero-reveal-delay-4">${escapeHtml(t.hero.kicker)}</p>
                    <div class="hero-actions hero-reveal hero-reveal-delay-5">
                      <button type="button" class="btn btn-lg btn-primary-hero" data-open-contact>${escapeHtml(t.hero.primary)} <span>${iconGlyph("arrow")}</span></button>
                      <a href="#examples" class="btn btn-lg btn-secondary-hero">${escapeHtml(t.hero.secondary)}</a>
                    </div>
                    <p class="hero-micro hero-reveal hero-reveal-delay-5">${escapeHtml(t.hero.micro)}</p>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section id="process" class="section">
            <div class="container">
              <div class="section-head">
                <p class="eyebrow">${escapeHtml(t.process.eyebrow)}</p>
                <h2 class="section-title">${escapeHtml(t.process.title)}</h2>
                <p class="section-subtitle">${escapeHtml(t.process.subtitle)}</p>
              </div>

              <div class="process-grid">
                ${t.process.items.map((item, index) => `
                  <article class="process-card">
                    ${makeProcessVisual(IMAGE_CONFIG.process[index]?.src || "", IMAGE_CONFIG.process[index]?.alt || item[0])}
                    <div class="process-step">0${index + 1}</div>
                    <div>
                      <h3>${escapeHtml(item[0])}</h3>
                      <p>${escapeHtml(item[1])}</p>
                    </div>
                    ${index < t.process.items.length - 1 ? `<div class="process-arrow">${iconGlyph("arrow")}</div>` : ""}
                  </article>
                `).join("")}
              </div>
            </div>
          </section>

          <section id="benefits" class="section">
            <div class="container">
              <div class="section-head">
                <p class="eyebrow">${escapeHtml(t.benefits.eyebrow)}</p>
                <h2 class="section-title">${escapeHtml(t.benefits.title)}</h2>
                <p class="section-subtitle">${escapeHtml(t.benefits.subtitle)}</p>
                <p class="script-line">${escapeHtml(t.benefits.accent)}</p>
              </div>

              <div class="benefits-grid">
                ${t.benefits.items.map(item => `
                  <article class="benefit-card">
                    <div class="benefit-label">${escapeHtml(item[0])}</div>
                    <div class="benefit-main">${escapeHtml(item[1])}</div>
                    <div class="benefit-note">${escapeHtml(item[2])}</div>
                  </article>
                `).join("")}
              </div>
            </div>
          </section>

          <section id="examples" class="section examples-section">
            <div class="container">
              <div class="section-head">
                <p class="eyebrow">${escapeHtml(t.examples.eyebrow)}</p>
                <h2 class="section-title">${escapeHtml(t.examples.title)}</h2>
                <p class="section-subtitle">${escapeHtml(t.examples.subtitle)}</p>
              </div>

              <div class="examples-controls">
                <div class="examples-control-group">
                  ${t.examples.categories.map(([key,label]) => `
                    <button type="button" class="category-tab ${activeCategory === key ? "active" : ""}" data-example-category="${key}">
                      ${escapeHtml(label)}
                    </button>
                  `).join("")}
                </div>
              </div>

              <div id="examples-module">
                ${renderExamplesModule(lang, activeCategory)}
              </div>
            </div>
          </section>

          <section id="project-options" class="section">
            <div class="container">
              <div class="section-head">
                <p class="eyebrow">${escapeHtml(t.projectOptions.eyebrow)}</p>
                <h2 class="section-title">${escapeHtml(t.projectOptions.title)}</h2>
                <p class="section-subtitle">${escapeHtml(t.projectOptions.subtitle)}</p>
                <p class="script-line">${escapeHtml(t.projectOptions.accent)}</p>
              </div>

              <div class="options-flow">
                ${t.projectOptions.items.map(item => `
                  <article class="option-chip ${escapeHtml(item[2])}">
                    <h3>${escapeHtml(item[0])}</h3>
                    <p>${escapeHtml(item[1])}</p>
                  </article>
                `).join("")}
              </div>
            </div>
          </section>

          <section id="services" class="section">
            <div class="container">
              <div class="section-head">
                <p class="eyebrow">${escapeHtml(t.services.eyebrow)}</p>
                <h2 class="section-title">${escapeHtml(t.services.title)}</h2>
                <p class="section-subtitle">${escapeHtml(t.services.subtitle)}</p>
              </div>

              <div class="services-grid">
                ${t.services.items.map((item, index) => `
                  <article class="service-card">
                    ${makeServiceVisual(IMAGE_CONFIG.services[index]?.src || "", IMAGE_CONFIG.services[index]?.alt || item[0])}
                    <h3>${escapeHtml(item[0])}</h3>
                    <p>${escapeHtml(item[1])}</p>
                    ${item[2] ? `
                      <div class="service-price">
                        <strong>${escapeHtml(t.services.priceFrom)}</strong>
                        <span>${escapeHtml(t.services.priceNote)}</span>
                      </div>
                    ` : ""}
                  </article>
                `).join("")}
              </div>

              <p class="services-note">${escapeHtml(t.services.bottom)}</p>
            </div>
          </section>

          <section id="who-fits" class="section">
            <div class="container">
              <div class="section-head">
                <p class="eyebrow">${escapeHtml(t.whoFits.eyebrow)}</p>
                <h2 class="section-title">${escapeHtml(t.whoFits.title)}</h2>
                <p class="section-subtitle">${escapeHtml(t.whoFits.subtitle)}</p>
              </div>

              <div class="fit-grid">
                ${t.whoFits.items.map((item, index) => `
                  <article class="fit-card ${item[2] ? item[2] : ""}">
                    ${makeFitVisual(IMAGE_CONFIG.whoFits[index]?.src || "", IMAGE_CONFIG.whoFits[index]?.alt || item[0])}
                    <div class="fit-kicker">0${index + 1}</div>
                    <h3>${escapeHtml(item[0])}</h3>
                    <p>${escapeHtml(item[1])}</p>
                  </article>
                `).join("")}
              </div>
            </div>
          </section>

          <section id="contact" class="section">
            <div class="container">
              <div class="contact-wrap">
                <div class="contact-intro">
                  <h2 class="contact-title">${escapeHtml(t.contact.title)}</h2>
                  <p class="contact-subtitle">${escapeHtml(t.contact.subtitle)}</p>
                  <p class="contact-text">${escapeHtml(t.contact.text)}</p>
                </div>

                <div class="contact-card">
                  <div class="contact-actions">
                    <h3>${escapeHtml(t.contact.methodsTitle)}</h3>
                    <p class="contact-helper">${escapeHtml(t.contact.methodsText)}</p>

                    <div class="contact-buttons contact-groups">
                      ${t.contact.groups.map(group => `
                        <div class="contact-group">
                          <div class="contact-group-title">${escapeHtml(group.title)}</div>
                          <div class="contact-group-grid">
                            ${group.items.map(([key,label]) => {
                              const href = socialHref(key);
                              return `<a class="btn contact-button" href="${href}"${socialAttrs(href)}><span>${escapeHtml(label)}</span><span>${iconGlyph("arrow")}</span></a>`;
                            }).join("")}
                          </div>
                        </div>
                      `).join("")}
                    </div>

                    <p class="contact-legal-note">${escapeHtml(t.contact.legalNote)}</p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </main>

        <footer class="site-footer">
          <div class="container footer-inner">
            <div class="footer-top">
              <div class="footer-note">${escapeHtml(t.footer)}</div>
              <div class="footer-mini">
                ${t.socials.map(([key,label]) => {
                  const href = socialHref(key);
                  return `<a href="${href}"${socialAttrs(href)}>${escapeHtml(label)}</a>`;
                }).join("")}
              </div>
            </div>

            <div class="footer-legal">
              <div class="footer-legal-links">
                <a href="${LEGAL_LINKS.privacy}">${escapeHtml(t.legalLinks.privacy)}</a>
                <a href="${LEGAL_LINKS.terms}">${escapeHtml(t.legalLinks.terms)}</a>
                <a href="${LEGAL_LINKS.cookies}">${escapeHtml(t.legalLinks.cookies)}</a>
              </div>
              <p>${escapeHtml(t.legalOwner)}</p>
              <p>Email: <a href="mailto:${escapeHtml(t.legalEmail)}">${escapeHtml(t.legalEmail)}</a></p>
              <p>${escapeHtml(t.legalAddress)}</p>
            </div>
          </div>
        </footer>

        <div id="contactModal" class="modal hidden" aria-hidden="true">
          <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="contactModalTitle">
            <div class="modal-head">
              <div>
                <h3 class="modal-title" id="contactModalTitle">${escapeHtml(t.contact.methodsTitle)}</h3>
                <p class="modal-text">${escapeHtml(t.contact.methodsText)}</p>
              </div>
              <button type="button" class="modal-close" data-modal-close aria-label="Close">✕</button>
            </div>

            <div class="modal-links modal-groups">
              ${t.contact.groups.map(group => `
                <div class="modal-group">
                  <div class="contact-group-title">${escapeHtml(group.title)}</div>
                  <div class="contact-group-grid">
                    ${group.items.map(([key,label]) => {
                      const href = socialHref(key);
                      return `<a class="modal-link" href="${href}"${socialAttrs(href)}><span>${escapeHtml(label)}</span><span>${iconGlyph("arrow")}</span></a>`;
                    }).join("")}
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      
        <div id="cookieBanner" class="cookie-banner" role="dialog" aria-live="polite" aria-label="Cookie consent">
          <p>${lang === "ru"
            ? 'Мы используем cookies и аналитические инструменты для улучшения работы сайта. Нажимая «Принять», вы соглашаетесь с использованием аналитических cookies. Подробнее — в <a href="' + LEGAL_LINKS.privacy + '">Политике конфиденциальности</a> и <a href="' + LEGAL_LINKS.cookies + '">Политике cookies</a>.'
            : 'We use cookies and analytics tools to improve the website. By clicking “Accept”, you agree to the use of analytics cookies. Learn more in the <a href="' + LEGAL_LINKS.privacy + '">Privacy Policy</a> and <a href="' + LEGAL_LINKS.cookies + '">Cookie Policy</a>.'}
          </p>
          <div class="cookie-actions">
            <button class="btn btn-pill btn-dark" type="button" data-consent="accepted">${lang === "ru" ? "Принять" : "Accept"}</button>
            <button class="btn btn-pill btn-light" type="button" data-consent="rejected">${lang === "ru" ? "Только необходимые" : "Necessary only"}</button>
          </div>
        </div>
      `;

      app.querySelectorAll("[data-lang]").forEach(btn => {
        btn.addEventListener("click", () => {
          const currentCategory = document.querySelector(".category-tab.active")?.dataset.exampleCategory || "living";
          setLanguage(btn.dataset.lang, currentCategory);
        });
      });

      app.querySelectorAll("[data-example-category]").forEach(btn => {
        btn.addEventListener("click", () => {
          render(lang, btn.dataset.exampleCategory);
        });
      });

      app.querySelectorAll("[data-open-contact]").forEach(btn => {
        btn.addEventListener("click", openContactModal);
      });

      app.querySelectorAll("[data-modal-close]").forEach(btn => {
        btn.addEventListener("click", closeContactModal);
      });

      const modal = document.getElementById("contactModal");
      if(modal){
        modal.addEventListener("click", (event) => {
          if(event.target === modal) closeContactModal();
        });
      }

      const savedConsent = localStorage.getItem("lav-cookie-consent") || "unknown";
      updateCookieBanner(savedConsent);

      app.querySelectorAll("[data-consent]").forEach(btn => {
        btn.addEventListener("click", () => {
          const value = btn.dataset.consent;
          localStorage.setItem("lav-cookie-consent", value);
          updateCookieBanner(value);
          if(value === "accepted") loadAnalytics();
        });
      });

      if(savedConsent === "accepted"){
        loadAnalytics();
      }

      initHeroParallax();
    }

    function initHeroParallax(){
      const heroCard = document.querySelector('.hero-card');
      const heroImage = document.querySelector('.hero-image img');
      if(!heroCard || !heroImage) return;

      const updateByScroll = () => {
        const rect = heroCard.getBoundingClientRect();
        const offset = Math.max(-24, Math.min(24, rect.top * -0.04));
        heroImage.style.transform = `scale(1.05) translate3d(0, ${offset}px, 0)`;
      };

      updateByScroll();
      if(window.__lavHeroScrollHandler){ window.removeEventListener('scroll', window.__lavHeroScrollHandler); }
      window.__lavHeroScrollHandler = updateByScroll;
      window.addEventListener('scroll', window.__lavHeroScrollHandler, { passive:true });
    }

    function setLanguage(lang, activeCategory = "living"){
      localStorage.setItem("lav-language", lang);
      render(lang, activeCategory);
    }

    function openContactModal(){
      const modal = document.getElementById("contactModal");
      if(!modal) return;
      modal.classList.remove("hidden");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeContactModal(){
      const modal = document.getElementById("contactModal");
      if(!modal) return;
      modal.classList.add("hidden");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function updateCookieBanner(state){
      const banner = document.getElementById("cookieBanner");
      if(!banner) return;
      banner.style.display = state === "unknown" ? "grid" : "none";
    }

    function loadAnalytics(){
      if(window.__lavAnalyticsLoaded) return;
      window.__lavAnalyticsLoaded = true;
      console.log("Analytics initialized after consent.");
      /*
        Insert Yandex.Metrica / GA / pixels here only after explicit consent.
      */
    }

    document.addEventListener("keydown", (event) => {
      if(event.key === "Escape") closeContactModal();
    });

    document.addEventListener("DOMContentLoaded", () => {
      const savedLang = localStorage.getItem("lav-language");
      const lang = savedLang === "en" ? "en" : "ru";
      render(lang, "living");
    });
  </script>
</body>
</html>
